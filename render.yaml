services:
  - type: web
    name: portafolio-zonajava
    env: java
    buildCommand: mvn clean package
    startCommand: java -jar target/portafolio-1.0-SNAPSHOT.war
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: DATABASE_URL
        fromDatabase:
          name: portafolio-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: portafolio-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: portafolio-db
          property: password

databases:
  - name: portafolio-db
    databaseName: portafolio_db
    user: portafolio_user
    plan: free